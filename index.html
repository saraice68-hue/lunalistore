<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lunalí Streaming</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9acb,#ff4fa3);
display:flex;
justify-content:center;
padding:20px
}
.container{
width:100%;
max-width:520px;
background:#fff0f6;
border-radius:25px;
padding:25px 15px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
display:flex;
flex-direction:column;
align-items:center
}
input{
display:block;
width:90%;
margin:10px auto;
padding:14px;
border-radius:16px;
border:2px solid #ff80b5;
font-size:1rem
}
#perfilBtns{
display:flex;
gap:10px;
margin:15px 0
}
#perfilBtns button{
padding:8px 16px;
border:none;
border-radius:20px;
background:#f8bbd0;
cursor:pointer
}
#perfilBtns button.active{
background:#c2185b;
color:white
}
#salida{
width:90%;
background:#fff;
padding:15px;
border-radius:18px;
white-space:pre-wrap;
font-family:monospace;
border:2px dashed #ff80b5
}
</style>

</head>
<body>

<div class="container">

<input id="plataforma" placeholder="Plataforma">
<input id="correo" placeholder="Correo">
<input id="contrasena" placeholder="Contraseña">
<input id="tipo" placeholder="Tipo (c = Completa)">

<div id="perfilBtns"></div>
<div id="salida"></div>

</div>

<script>

const plataformas={
n:"NETFLIX",
m:"MAX",
p:"PRIME VIDEO",
pr:"PARAMOUNT+",
v:"VIX",
va:"VIX ANUAL",
d:"DISNEY+",
c:"CHATGPT",
cr:"CRUNCHYROLL",
s:"SPOTIFY",
s3:"SPOTIFY 3 MESES",
yf:"YOUTUBE FAMILIAR",
fx:"FOX ONE"
};

let perfil="P1";

function crearPerfiles(){
perfilBtns.innerHTML="";
const p=plataforma.value.toLowerCase();

if(tipo.value.toLowerCase()==="c"){
perfil="COMPLETA";
perfilBtns.style.display="none";
return;
}

perfilBtns.style.display="flex";

for(let i=1;i<=5;i++){
const b=document.createElement("button");
b.textContent="P"+i;

if(i===1){b.classList.add("active");perfil="P1"}

b.onclick=()=>{
document.querySelectorAll("#perfilBtns button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
perfil=b.textContent;
generar();
}

perfilBtns.appendChild(b);
}
}

function generar(){

const p=plataforma.value.toLowerCase();
if(!plataformas[p]||!correo.value||!contrasena.value){
salida.textContent="";
return;
}

const f=new Date();
const meses=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const fecha=`${f.getDate()} ${meses[f.getMonth()]} ${f.getFullYear()}`;

let garantia="25 días a partir de la entrega";
if(p==="va") garantia="6 meses de garantía";
if(p==="s3") garantia="70 días de garantía";

// 🔴 COMPLETA
if(tipo.value.toLowerCase()==="c"){
salida.textContent=`> ✨ LUNALI STREAMING ✨

🐇 ${plataformas[p]} • ${fecha}

Correo: ${correo.value}
Contraseña: ${contrasena.value}
Perfil: COMPLETA

⚠️ REGLAS:
❌ No cambiar datos
❌ No modificar facturación
⚠️ Máximo 5 dispositivos por cuenta

⏳ Confirmar en 10 minutos
📸 Enviar comprobante

💖 GARANTÍA:
${garantia}

🚩 REPORTES:
https://forms.gle/Y7sHyL7Gouchfwuc8`;

return;
}

// 🟢 PERFILES
salida.textContent=`> ✨ LUNALI STREAMING ✨

🐇 ${plataformas[p]} • ${fecha}

Correo: ${correo.value}
Contraseña: ${contrasena.value}
Perfil: ${perfil}

⚠️ REGLAS:
❌ No cambiar datos
❌ No modificar facturación
⚠️ 1 dispositivo por perfil

⏳ Confirmar en 10 minutos
📸 Enviar comprobante

💖 GARANTÍA:
${garantia}

🚩 REPORTES:
https://forms.gle/Y7sHyL7Gouchfwuc8`;
}

document.querySelectorAll("input").forEach(i=>i.oninput=()=>{
crearPerfiles();
generar();
});

crearPerfiles();

</script>

</body>
</html>
